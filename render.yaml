services:
  - type: web
    name: skill-swap-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: JWT_SECRET
        generateValue: true
      - key: HF_API_KEY
        sync: false # User will need to set this in Render dashboard
